name: vitaliq
description: "AI-powered personal health coach."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase (no Storage, no Functions — Spark plan compatible)
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  firebase_messaging: ^16.3.0
  firebase_crashlytics: ^5.2.3

  # State Management
  flutter_riverpod: ^3.3.1
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^17.3.0

  # Health data (HealthKit iOS + Health Connect Android)
  health: ^13.3.1
  pedometer: ^4.2.0

  # Charts
  fl_chart: ^1.2.0

  # Animations
  lottie: ^3.3.3

  # Image
  image_picker: ^1.2.2
  cached_network_image: ^3.4.1

  # Permissions
  permission_handler: ^12.0.3



  # Networking (for OpenAI direct call)
  dio: ^5.9.2

  # PDF generation (replaces Cloud Functions)
  pdf: ^3.10.8
  printing: ^5.12.0

  # Utils
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  connectivity_plus: ^7.1.1
  uuid: ^4.5.3
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: "^0.14.4"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
